name: engineering

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  # One-shot: apply DB migrations, then exit. App services wait for it to finish.
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: engineering/app:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/engineering
    command: ["pnpm", "--filter", "@eng/db", "db:migrate"]
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: engineering/app:local
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/engineering
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: engineering
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["pnpm", "--filter", "@eng/server", "start"]
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: engineering/app:local
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/engineering
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: engineering
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_BASE_BRANCH: ${GITHUB_BASE_BRANCH:-main}
      GITHUB_DEPLOY_WORKFLOW: ${GITHUB_DEPLOY_WORKFLOW:-}
      GITHUB_DEPLOY_REF: ${GITHUB_DEPLOY_REF:-main}
      PERSISTENCE_BACKEND: ${PERSISTENCE_BACKEND:-postgres}
      GITHUB_DOCS_PREFIX: ${GITHUB_DOCS_PREFIX:-docs}
      # Delivery backend (ENG-017): set DELIVERY_BACKEND=local to commit the agent's code to a local
      # git repo under ./workspace (no GitHub needed); unset/`github` uses the GitHub adapter.
      DELIVERY_BACKEND: ${DELIVERY_BACKEND:-}
    command: ["pnpm", "--filter", "@eng/server", "worker"]
    # Surface the working-code workspace (local-git commits) on the host so you can inspect the repo.
    volumes:
      - ./workspace:/app/workspace

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - server
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "5173:5173"

volumes:
  postgres-data:
